<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Convertor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --phone-scale: 1;
      }
      .dm-sans {
        font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      }
      .key {
        transition: transform 90ms ease;
      }
      .key:active,
      .key.is-pressed {
        transform: translateY(1px) scale(0.985);
      }
      .amount-value {
        transition: transform 140ms ease;
      }
      .amount-value.is-bump {
        transform: translateY(-1px) scale(1.02);
      }
      .input-card {
        transition: box-shadow 180ms ease, border-color 180ms ease;
      }
      .input-card.state-active {
        box-shadow: 0 0 0 1px rgba(178, 229, 86, 0.35), 0 10px 24px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body class="bg-black min-h-screen flex items-center justify-center p-4">
    <div id="phoneViewport" class="w-full max-w-[430px] flex items-center justify-center">
      <div
        id="phone"
        class="relative h-[92vh] max-h-[898px] w-full max-w-[430px] overflow-hidden rounded-[38px] border border-white/10"
      >
        <div aria-hidden="true" class="absolute inset-0 bg-gradient-to-b from-[#3a4526] to-[#060606]"></div>

        <div class="relative z-10 flex h-[55px] items-center justify-center px-[24px]">
          <p id="appTitle" class="dm-sans text-white text-[18px] font-medium tracking-[4.5px]">
            Currency Convertor
          </p>
        </div>

        <div class="relative z-10 px-[16px] pt-[21px]">
          <div class="relative h-[319px]">
            <div
              id="fromCard"
              class="input-card state-active h-[151.5px] rounded-[24px] bg-white/20 px-[16px] pt-[16px] pb-[60px]"
            >
              <button
                id="fromDropdownBtn"
                class="ml-auto flex items-center gap-[8px] dm-sans text-[12px] text-white"
                type="button"
              >
                <span id="fromCurrency">AED</span>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3.2 5.2L7 9L10.8 5.2" stroke="#b2e556" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <p class="mt-[38px] text-right dm-sans text-[48px] leading-none font-medium text-white">
                <span id="fromAmount" class="amount-value">0</span>
              </p>
            </div>

            <button
              id="swapBtn"
              type="button"
              class="absolute left-[75px] top-[140px] z-20 size-[40px] rotate-90 rounded-[15px] bg-white/20 flex items-center justify-center"
              aria-label="Swap currencies"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M8 4L5 7L8 10M16 20L19 17L16 14M5 7H16M8 17H19" stroke="#b2e556" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>

            <div
              id="toCard"
              class="input-card state-default mt-[16px] h-[151.5px] rounded-[24px] bg-white/20 px-[16px] pt-[16px] pb-[60px]"
            >
              <button
                id="toDropdownBtn"
                class="ml-auto flex items-center gap-[8px] dm-sans text-[12px] text-white"
                type="button"
              >
                <span id="toCurrency">USD</span>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3.2 5.2L7 9L10.8 5.2" stroke="#b2e556" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <p class="mt-[38px] text-right dm-sans text-[48px] leading-none font-medium text-white">
                <span id="toAmount" class="amount-value">0</span>
              </p>
            </div>
          </div>
        </div>

        <div class="relative z-10 mx-[16px] mt-[8px] h-px bg-white/10"></div>

        <div class="relative z-10 mt-[8px] grid grid-cols-4 gap-[8px] px-[16px] pb-[16px]">
          <button data-key="7" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">7</button>
          <button data-key="8" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">8</button>
          <button data-key="9" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">9</button>
          <button data-key="swap-theme" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-black bg-[#b2e556]"><span id="themeModeIcon">☀</span></button>
          <button data-key="4" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">4</button>
          <button data-key="5" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">5</button>
          <button data-key="6" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">6</button>
          <button data-key="backspace" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-black bg-[#b2e556]">⌫</button>
          <button data-key="1" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">1</button>
          <button data-key="2" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">2</button>
          <button data-key="3" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">3</button>
          <button data-key="ac" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-black bg-[#b2e556]">Clr</button>
          <button data-key="0" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">0</button>
          <button data-key="dot" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">.</button>
          <button data-key="equals" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-white bg-[#3a4526]">=</button>
          <button data-key="go" class="key h-[94px] rounded-[20px] dm-sans text-[24px] text-black bg-[#b2e556]">Go</button>
        </div>

        <div id="currencySheetOverlay" class="hidden absolute inset-0 z-30" role="dialog" aria-modal="true">
          <div class="absolute inset-0 bg-black/35" data-role="backdrop"></div>
          <div id="currencySheet" class="absolute bottom-0 left-0 w-full h-[592px] rounded-t-[28px] bg-[#3a4526] px-[24px] pt-[32px] pb-[16px]">
            <div class="flex items-start justify-between">
              <div>
                <p id="sheetTitle" class="dm-sans text-[24px] leading-[31px] text-white">Currency Symbols</p>
                <p id="sheetSubtitle" class="dm-sans text-[16px] leading-[21px] text-[#c8c8c8]">Select your currency you want to convert</p>
              </div>
              <button id="currencySheetCloseBtn" class="h-[40px] w-[40px] rounded-[15px] bg-white/10 text-white">✕</button>
            </div>
            <div id="currencySheetList" class="mt-[24px] h-[460px] overflow-y-auto pr-1"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
